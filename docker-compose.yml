services:
  news-briefing:
    build: .
    container_name: news-briefing
    environment:
      # alleen nodig als je email.enabled: true zet in config.yaml
      - NEWSLETTER_SMTP_PASS=${NEWSLETTER_SMTP_PASS:-}
    volumes:
      - ./output:/app/output
      - ./config.yaml:/app/config.yaml:ro
    # deze service draait normaal niet continu, ofelia triggert 'm hieronder
    command: ["python3", "news_briefing.py"]
    labels:
      ofelia.enabled: "true"
      ofelia.job-run.morning-briefing.schedule: "0 30 6 * * *"   # elke dag 06:30
      ofelia.job-run.morning-briefing.container: "news-briefing"

  scheduler:
    image: mcuadros/ofelia:latest
    container_name: news-briefing-scheduler
    depends_on:
      - news-briefing
    command: daemon --docker
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
    restart: unless-stopped
